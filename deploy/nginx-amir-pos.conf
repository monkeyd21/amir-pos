# nginx reverse proxy → Node on :3000.
# Install:
#   sudo cp deploy/nginx-amir-pos.conf /etc/nginx/sites-available/amir-pos
#   sudo ln -s /etc/nginx/sites-available/amir-pos /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see DEPLOY-ORACLE.md) — it rewrites this for HTTPS automatically.
server {
    listen 80;
    listen [::]:80;
    server_name pos.example.com;   # <-- your domain

    # Excel inventory import + label PDFs can be chunky; allow >10mb bodies.
    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
