<div class="relative">
  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-lg text-on-surface-variant/50">
    search
  </span>
  <input
    type="text"
    [value]="value"
    (input)="onInput($event)"
    [placeholder]="placeholder"
    class="w-full pl-10 pr-9 py-2.5 text-sm font-body bg-surface-container-lowest text-on-surface placeholder:text-on-surface-variant/40 border-0 border-b-2 border-transparent rounded-lg focus:border-b-primary focus:outline-none transition-colors"
  />
  @if (value) {
    <button
      (click)="clear()"
      class="absolute right-2 top-1/2 -translate-y-1/2 p-0.5 rounded hover:bg-surface-container-high/60 transition-colors cursor-pointer"
    >
      <span class="material-symbols-outlined text-base text-on-surface-variant/50">close</span>
    </button>
  }
</div>
