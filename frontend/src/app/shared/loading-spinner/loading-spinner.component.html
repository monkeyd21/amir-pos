@if (overlay) {
  <div class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-surface/70 backdrop-blur-sm rounded-xl">
    <div
      class="spinner-ring rounded-full border-primary/20 border-t-primary"
      [ngClass]="sizeClasses"
    ></div>
    @if (message) {
      <p class="mt-3 text-sm font-body text-on-surface-variant">{{ message }}</p>
    }
  </div>
} @else {
  <div class="flex flex-col items-center justify-center py-8">
    <div
      class="spinner-ring rounded-full border-primary/20 border-t-primary"
      [ngClass]="sizeClasses"
    ></div>
    @if (message) {
      <p class="mt-3 text-sm font-body text-on-surface-variant">{{ message }}</p>
    }
  </div>
}
