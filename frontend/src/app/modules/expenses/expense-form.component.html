<!-- Loading State -->
@if (loading) {
  <div class="flex items-center justify-center h-[60vh]">
    <div class="flex flex-col items-center gap-4">
      <div class="w-10 h-10 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div>
      <p class="text-sm text-on-surface-variant">Loading expense...</p>
    </div>
  </div>
}

@if (!loading) {
  <div class="space-y-8 max-w-2xl">

    <!-- Page Header -->
    <div>
      <div class="flex items-center gap-3 mb-1">
        <a routerLink="/expenses" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-xl">arrow_back</span>
        </a>
        <h1 class="text-3xl font-headline font-bold text-on-surface">
          {{ isEdit ? 'Edit Expense' : 'Add Expense' }}
        </h1>
      </div>
      <p class="mt-1 text-sm text-on-surface-variant ml-9">
        {{ isEdit ? 'Update expense details.' : 'Record a new business expense.' }}
      </p>
    </div>

    <!-- Form Card -->
    <div class="bg-surface-container rounded-2xl border border-outline-variant/10 overflow-hidden">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-8 space-y-6">

        <!-- Description -->
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Description</label>
          <input
            formControlName="description"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none placeholder:text-outline/50 text-sm"
            placeholder="What was this expense for?"
          />
        </div>

        <!-- Amount & Category Row -->
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Amount</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm font-bold">&#8377;</span>
              <input
                formControlName="amount"
                type="number"
                min="0"
                step="0.01"
                class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface pl-8 pr-4 py-3 rounded-lg transition-all outline-none placeholder:text-outline/50 text-sm"
                placeholder="0.00"
              />
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Category</label>
            <select
              formControlName="categoryId"
              class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none text-sm appearance-none cursor-pointer"
            >
              <option [ngValue]="null">Select category...</option>
              @for (cat of categories; track cat.id) {
                <option [ngValue]="cat.id">{{ cat.name }}</option>
              }
            </select>
          </div>
        </div>

        <!-- Date -->
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Date</label>
          <input
            formControlName="date"
            type="date"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none text-sm max-w-xs"
          />
        </div>

        <!-- Notes -->
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Notes</label>
          <textarea
            formControlName="notes"
            rows="3"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none placeholder:text-outline/50 text-sm resize-none"
            placeholder="Additional notes (optional)"
          ></textarea>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3 pt-4 border-t border-outline-variant/10">
          <a
            routerLink="/expenses"
            class="px-6 py-3 rounded-xl bg-surface-container-high border border-outline-variant/20 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors"
          >
            Cancel
          </a>
          <button
            type="submit"
            [disabled]="form.invalid || saving"
            class="gradient-cta text-on-primary-container font-bold px-6 py-3 rounded-xl shadow-glow-sm hover:shadow-glow active:scale-[0.98] transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
          >
            @if (saving) {
              <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Saving...
            } @else {
              <span class="material-symbols-outlined text-lg">check</span>
              {{ isEdit ? 'Update Expense' : 'Add Expense' }}
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}
