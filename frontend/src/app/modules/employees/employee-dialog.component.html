<!-- Backdrop -->
<div
  class="dialog-backdrop fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm"
  (click)="onBackdropClick($event)"
>
  <!-- Dialog Card -->
  <div class="w-full max-w-lg rounded-2xl bg-[#1a2340] border border-outline-variant/20 shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between px-8 py-6 border-b border-outline-variant/10">
      <div>
        <h2 class="text-xl font-headline font-bold text-on-surface">
          {{ isEdit ? 'Edit Employee' : 'Add Employee' }}
        </h2>
        <p class="text-xs text-on-surface-variant mt-1">
          {{ isEdit ? 'Update employee information' : 'Add a new team member' }}
        </p>
      </div>
      <button
        (click)="onCancel()"
        class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-8 space-y-6">

      <!-- Name Row -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">First Name</label>
          <input
            formControlName="firstName"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none placeholder:text-outline/50 text-sm"
            placeholder="John"
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Last Name</label>
          <input
            formControlName="lastName"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none placeholder:text-outline/50 text-sm"
            placeholder="Doe"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Email</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
          <input
            formControlName="email"
            type="email"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface pl-12 pr-4 py-3 rounded-lg transition-all outline-none placeholder:text-outline/50 text-sm"
            placeholder="john@clothingerp.com"
          />
        </div>
      </div>

      <!-- Phone -->
      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Phone</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">phone</span>
          <input
            formControlName="phone"
            type="tel"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface pl-12 pr-4 py-3 rounded-lg transition-all outline-none placeholder:text-outline/50 text-sm"
            placeholder="+91 98765 43210"
          />
        </div>
      </div>

      <!-- Role & Branch Row -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Role</label>
          <select
            formControlName="role"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none text-sm appearance-none cursor-pointer"
          >
            @for (role of roles; track role.value) {
              <option [value]="role.value">{{ role.label }}</option>
            }
          </select>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Branch</label>
          <select
            formControlName="branchId"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface px-4 py-3 rounded-lg transition-all outline-none text-sm appearance-none cursor-pointer"
          >
            <option [ngValue]="null">Select branch...</option>
            @for (branch of branches; track branch.id) {
              <option [ngValue]="branch.id">{{ branch.name }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Commission Rate -->
      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Commission Rate (%)</label>
        <div class="relative w-40">
          <input
            formControlName="commissionRate"
            type="number"
            min="0"
            max="100"
            step="0.5"
            class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container text-on-surface pl-4 pr-8 py-3 rounded-lg transition-all outline-none text-sm"
            placeholder="0"
          />
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-xs pointer-events-none">%</span>
        </div>
        <p class="text-[10px] text-on-surface-variant/60">Percentage of sale amount earned as commission</p>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-outline-variant/10">
        <button
          type="button"
          (click)="onCancel()"
          class="px-6 py-3 rounded-xl bg-surface-container border border-outline-variant/20 text-sm font-medium text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="form.invalid || saving"
          class="gradient-cta text-on-primary-container font-bold px-6 py-3 rounded-xl shadow-glow-sm hover:shadow-glow active:scale-[0.98] transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
        >
          @if (saving) {
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Saving...
          } @else {
            <span class="material-symbols-outlined text-lg">check</span>
            {{ isEdit ? 'Update' : 'Add Employee' }}
          }
        </button>
      </div>
    </form>
  </div>
</div>
