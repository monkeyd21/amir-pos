<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Employees</h1>
      <p class="text-slate-500">Manage staff and roles</p>
    </div>
    <button mat-flat-button color="primary" (click)="openAddDialog()">
      <mat-icon>person_add</mat-icon> Add Employee
    </button>
  </div>

  <!-- Search -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
    <mat-form-field class="w-full" appearance="outline">
      <mat-label>Search employees</mat-label>
      <input matInput [formControl]="searchCtrl" placeholder="Name, role..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    @if (loading) {
      <div class="flex justify-center p-12">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
    } @else {
      <table mat-table [dataSource]="dataSource" matSort class="w-full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">Name</th>
          <td mat-cell *matCellDef="let row" class="font-medium text-slate-800">{{ row.name }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">Role</th>
          <td mat-cell *matCellDef="let row">{{ row.role | titlecase }}</td>
        </ng-container>

        <ng-container matColumnDef="branch">
          <th mat-header-cell *matHeaderCellDef class="font-semibold">Branch</th>
          <td mat-cell *matCellDef="let row">{{ row.branchName || row.branch?.name || '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="commissionRate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">Commission %</th>
          <td mat-cell *matCellDef="let row" class="font-mono">{{ row.commissionRate || 0 }}%</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="font-semibold">Status</th>
          <td mat-cell *matCellDef="let row">
            <span class="text-xs font-medium px-2 py-1 rounded-full"
              [class]="row.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'">
              {{ row.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="openEditDialog(row)">
                <mat-icon>edit</mat-icon> Edit
              </button>
              <button mat-menu-item (click)="deleteEmployee(row)" class="text-red-600">
                <mat-icon>delete</mat-icon> Delete
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-slate-50"></tr>
      </table>
      <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
    }
  </div>
</div>
