<div class="flex items-center justify-center min-h-screen p-6 overflow-hidden bg-surface">
  <!-- Ambient Background Elements -->
  <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container opacity-10 rounded-full blur-[120px]"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-tertiary-container opacity-5 rounded-full blur-[100px]"></div>

  <main class="relative w-full max-w-[440px]">
    <!-- Brand -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-16 h-16 gradient-primary rounded-full flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(70,95,255,0.3)]">
        <span class="material-symbols-outlined text-on-primary-container text-4xl">app_registration</span>
      </div>
      <h1 class="text-on-surface text-3xl font-extrabold tracking-tight mb-2 font-headline">Atelier</h1>
      <p class="text-on-surface-variant font-medium tracking-wide text-sm uppercase opacity-80">Fashion Management Suite</p>
    </div>

    <!-- Login Card -->
    <div class="bg-surface-container rounded-2xl p-10 border border-outline-variant/10 shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 left-0 w-1 h-full gradient-primary opacity-50"></div>

      <div class="flex flex-col gap-8">
        <div class="space-y-2">
          <h2 class="text-on-surface text-xl font-bold font-headline">Welcome back</h2>
          <p class="text-on-surface-variant text-sm">Please enter your credentials to access the system.</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
          <!-- Email -->
          <div class="flex flex-col gap-2">
            <label class="text-on-surface-variant text-xs font-bold uppercase tracking-wider">Work Email</label>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-4 text-outline text-xl">mail</span>
              <input
                formControlName="email"
                class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container focus:ring-0 text-on-surface px-12 py-4 rounded-lg transition-all outline-none placeholder:text-outline/50"
                placeholder="admin@clothingerp.com"
                type="email"
              />
            </div>
          </div>

          <!-- Password -->
          <div class="flex flex-col gap-2">
            <div class="flex justify-between items-end">
              <label class="text-on-surface-variant text-xs font-bold uppercase tracking-wider">Password</label>
              <a class="text-primary text-[11px] font-semibold hover:text-white transition-colors cursor-pointer">FORGOT PASSWORD?</a>
            </div>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-4 text-outline text-xl">lock</span>
              <input
                formControlName="password"
                class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container focus:ring-0 text-on-surface px-12 py-4 rounded-lg transition-all outline-none placeholder:text-outline/50"
                placeholder="••••••••"
                [type]="showPassword ? 'text' : 'password'"
              />
              <span
                class="material-symbols-outlined absolute right-4 text-outline text-xl cursor-pointer hover:text-on-surface"
                (click)="togglePassword()"
              >
                {{ showPassword ? 'visibility_off' : 'visibility' }}
              </span>
            </div>
          </div>

          <!-- Remember me -->
          <div class="flex items-center">
            <label class="flex items-center gap-3 cursor-pointer group">
              <input
                type="checkbox"
                formControlName="rememberMe"
                class="w-5 h-5 rounded border-2 border-outline-variant bg-surface-container-lowest checked:bg-primary-container checked:border-primary-container text-on-primary-container focus:ring-0"
              />
              <span class="text-on-surface-variant text-sm group-hover:text-on-surface transition-colors">Keep me signed in</span>
            </label>
          </div>

          <!-- Error Message -->
          @if (errorMessage) {
            <div class="flex items-center gap-3 bg-error/10 border border-error/20 rounded-lg px-4 py-3">
              <span class="material-symbols-outlined text-error text-xl">error</span>
              <p class="text-error text-sm">{{ errorMessage }}</p>
            </div>
          }

          <!-- Submit -->
          <button
            type="submit"
            [disabled]="loginForm.invalid || loading"
            class="w-full gradient-primary text-on-primary-container font-bold py-4 rounded-full shadow-[0_8px_24px_rgba(70,95,255,0.2)] hover:shadow-[0_12px_32px_rgba(70,95,255,0.35)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group mt-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100"
          >
            @if (loading) {
              <svg class="animate-spin h-5 w-5 text-on-primary-container" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Signing in...
            } @else {
              Sign In
              <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
            }
          </button>
        </form>
      </div>
    </div>
  </main>
</div>
