<div class="w-[480px] bg-surface-container/95 backdrop-blur-xl border border-outline-variant/20 rounded-2xl shadow-ambient">
  <!-- Header -->
  <div class="flex items-center justify-between px-6 pt-6 pb-4">
    <div>
      <h2 class="text-xl font-headline font-bold text-on-surface tracking-tight">Adjust Stock</h2>
      <p class="mt-0.5 text-sm text-on-surface-variant">{{ productName }}</p>
    </div>
    <button
      (click)="onCancel()"
      class="p-2 rounded-xl hover:bg-surface-container-high/60 transition-colors cursor-pointer"
    >
      <span class="material-symbols-outlined text-xl text-on-surface-variant">close</span>
    </button>
  </div>

  <!-- Current Info -->
  <div class="mx-6 mb-5 flex items-center gap-3">
    @if (variantLabel) {
      <span class="inline-flex items-center px-2.5 py-1 text-xs font-medium font-label bg-surface-container-highest/60 text-on-surface-variant rounded-full">
        {{ variantLabel }}
      </span>
    }
    <span class="text-xs text-on-surface-variant">
      Current stock: <span class="font-bold text-on-surface">{{ currentStock }}</span>
    </span>
  </div>

  <!-- Form -->
  <div class="px-6 space-y-5">
    <!-- Adjustment Type -->
    <div>
      <label class="label-upper mb-2 block">Adjustment Type</label>
      <div class="grid grid-cols-3 gap-2">
        <button
          (click)="adjustmentType = 'add'"
          class="flex flex-col items-center gap-1.5 py-3 rounded-xl border transition-all cursor-pointer"
          [class]="adjustmentType === 'add'
            ? 'border-primary bg-primary-container/15 text-primary'
            : 'border-outline-variant/15 bg-surface-container-lowest text-on-surface-variant hover:border-outline-variant/30'"
        >
          <span class="material-symbols-outlined text-xl">add_circle</span>
          <span class="text-xs font-semibold font-label">Add</span>
        </button>
        <button
          (click)="adjustmentType = 'remove'"
          class="flex flex-col items-center gap-1.5 py-3 rounded-xl border transition-all cursor-pointer"
          [class]="adjustmentType === 'remove'
            ? 'border-tertiary bg-tertiary/10 text-tertiary'
            : 'border-outline-variant/15 bg-surface-container-lowest text-on-surface-variant hover:border-outline-variant/30'"
        >
          <span class="material-symbols-outlined text-xl">remove_circle</span>
          <span class="text-xs font-semibold font-label">Remove</span>
        </button>
        <button
          (click)="adjustmentType = 'set'"
          class="flex flex-col items-center gap-1.5 py-3 rounded-xl border transition-all cursor-pointer"
          [class]="adjustmentType === 'set'
            ? 'border-secondary bg-secondary-container/15 text-secondary'
            : 'border-outline-variant/15 bg-surface-container-lowest text-on-surface-variant hover:border-outline-variant/30'"
        >
          <span class="material-symbols-outlined text-xl">edit</span>
          <span class="text-xs font-semibold font-label">Set</span>
        </button>
      </div>
    </div>

    <!-- Quantity -->
    <div>
      <label class="label-upper mb-1.5 block">Quantity *</label>
      <input
        type="number"
        [(ngModel)]="quantity"
        placeholder="0"
        min="1"
        class="w-full px-4 py-2.5 text-sm font-body bg-surface-container-lowest text-on-surface placeholder:text-on-surface-variant/40 border border-outline-variant/15 rounded-lg focus:border-primary focus:outline-none transition-colors"
      />
      @if (quantity && quantity > 0) {
        <p class="mt-1.5 text-xs text-on-surface-variant">
          New stock will be:
          <span class="font-bold" [ngClass]="previewStock <= 0 ? 'text-error' : 'text-primary'">
            {{ previewStock }}
          </span>
        </p>
      }
    </div>

    <!-- Reason -->
    <div>
      <label class="label-upper mb-1.5 block">Reason *</label>
      <textarea
        [(ngModel)]="reason"
        rows="2"
        placeholder="e.g. Physical count correction, Purchase from supplier..."
        class="w-full px-4 py-2.5 text-sm font-body bg-surface-container-lowest text-on-surface placeholder:text-on-surface-variant/40 border border-outline-variant/15 rounded-lg focus:border-primary focus:outline-none transition-colors resize-none"
      ></textarea>
      <p class="mt-1 text-[10px] text-on-surface-variant/50">
        Tip: mention "purchase" in the reason to attribute this to a vendor.
      </p>
    </div>

    <!-- Vendor (only when reason looks like a purchase) -->
    @if (isPurchase) {
      <div>
        <label class="label-upper mb-1.5 block">Vendor (optional)</label>
        <app-vendor-picker
          [selectedId]="vendorId"
          (selectedIdChange)="vendorId = $event"
        ></app-vendor-picker>
      </div>
    }
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-3 px-6 py-5 mt-2 border-t border-outline-variant/10">
    <button
      (click)="onCancel()"
      class="px-4 py-2.5 text-sm font-medium font-body text-on-surface-variant rounded-lg hover:bg-surface-container-high/60 transition-colors cursor-pointer"
    >
      Cancel
    </button>
    <button
      (click)="onSubmit()"
      [disabled]="!isValid || saving"
      class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold font-body bg-gradient-cta text-white rounded-lg hover:shadow-glow-sm transition-all cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed"
    >
      @if (saving) {
        <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      }
      Apply Adjustment
    </button>
  </div>
</div>
