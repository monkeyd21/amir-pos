<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | ClothingERP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#2d3449",
                    "surface-container-high": "#222a3d",
                    "inverse-surface": "#dae2fd",
                    "primary": "#bbc3ff",
                    "tertiary-fixed": "#ffdbcc",
                    "on-secondary-fixed-variant": "#364186",
                    "on-surface-variant": "#c5c5d8",
                    "on-secondary-fixed": "#03105a",
                    "on-primary": "#001b96",
                    "surface-container-low": "#131b2e",
                    "on-surface": "#dae2fd",
                    "on-primary-fixed-variant": "#0029d2",
                    "surface-tint": "#bbc3ff",
                    "on-tertiary-container": "#fff6f3",
                    "on-tertiary": "#571f00",
                    "secondary": "#bbc3ff",
                    "on-secondary": "#1e296e",
                    "on-background": "#dae2fd",
                    "secondary-fixed": "#dfe0ff",
                    "primary-fixed-dim": "#bbc3ff",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#351000",
                    "primary-container": "#465fff",
                    "surface": "#0b1326",
                    "secondary-fixed-dim": "#bbc3ff",
                    "on-error": "#690005",
                    "surface-container": "#171f33",
                    "secondary-container": "#384389",
                    "primary-fixed": "#dfe0ff",
                    "outline": "#8f8fa2",
                    "on-secondary-container": "#a9b3ff",
                    "surface-dim": "#0b1326",
                    "tertiary-fixed-dim": "#ffb695",
                    "outline-variant": "#444656",
                    "error-container": "#93000a",
                    "inverse-primary": "#2e48eb",
                    "inverse-on-surface": "#283044",
                    "surface-container-lowest": "#060e20",
                    "on-primary-container": "#f9f7ff",
                    "on-primary-fixed": "#000d5f",
                    "surface-bright": "#31394d",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "error": "#ffb4ab",
                    "tertiary": "#ffb695",
                    "surface-variant": "#2d3449",
                    "tertiary-container": "#c14d00",
                    "background": "#0b1326"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b1326;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .architectural-gradient {
            background: linear-gradient(135deg, #465fff 0%, #bbc3ff 100%);
        }
        .glass-panel {
            background: rgba(49, 57, 77, 0.6);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">
<!-- Ambient Background Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container opacity-10 rounded-full blur-[120px]"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-tertiary-container opacity-5 rounded-full blur-[100px]"></div>
<main class="relative w-full max-w-[440px]">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 architectural-gradient rounded-full flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(70,95,255,0.3)]">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="app_registration">app_registration</span>
</div>
<h1 class="text-on-surface text-3xl font-extrabold tracking-tight mb-2">ClothingERP</h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm label-md uppercase opacity-80">Retail Management Suite</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container rounded-full p-10 border border-outline-variant/10 shadow-2xl relative overflow-hidden">
<!-- Subtle architectural accent -->
<div class="absolute top-0 left-0 w-1 h-full architectural-gradient opacity-50"></div>
<div class="flex flex-col gap-8">
<div class="space-y-2">
<h2 class="text-on-surface text-xl font-bold">Welcome back</h2>
<p class="text-on-surface-variant text-sm">Please enter your credentials to access the system.</p>
</div>
<form class="flex flex-col gap-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-on-surface-variant text-xs font-bold uppercase tracking-wider label-sm" for="email">Work Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container focus:ring-0 text-on-surface px-12 py-4 rounded-lg transition-all outline-none placeholder:text-outline/50" id="email" placeholder="admin@clothingerp.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<label class="text-on-surface-variant text-xs font-bold uppercase tracking-wider label-sm" for="password">Password</label>
<a class="text-primary text-[11px] font-semibold hover:text-white transition-colors" href="#">FORGOT PASSWORD?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/20 focus:border-primary-container focus:ring-0 text-on-surface px-12 py-4 rounded-lg transition-all outline-none placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-outline text-xl cursor-pointer hover:text-on-surface" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Controls -->
<div class="flex items-center">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 border-2 border-outline-variant rounded bg-surface-container-lowest peer-checked:bg-primary-container peer-checked:border-primary-container transition-all"></div>
<span class="material-symbols-outlined absolute inset-0 text-on-primary-container text-xs opacity-0 peer-checked:opacity-100 flex items-center justify-center font-bold" data-icon="check">check</span>
</div>
<span class="text-on-surface-variant text-sm group-hover:text-on-surface transition-colors">Keep me signed in</span>
</label>
</div>
<!-- CTA -->
<button class="w-full architectural-gradient text-on-primary-container font-bold py-4 rounded-full shadow-[0_8px_24px_rgba(70,95,255,0.2)] hover:shadow-[0_12px_32px_rgba(70,95,255,0.35)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group mt-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
</div>
<!-- Footer Annotation -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-xs tracking-widest label-sm uppercase opacity-40">
                © 2024 OmniRetail ERP Systems. All Rights Reserved.
            </p>
<div class="flex justify-center gap-6 mt-4">
<a class="text-on-surface-variant/40 hover:text-primary transition-colors text-xs font-bold uppercase tracking-tighter" href="#">Support</a>
<a class="text-on-surface-variant/40 hover:text-primary transition-colors text-xs font-bold uppercase tracking-tighter" href="#">Legal</a>
<a class="text-on-surface-variant/40 hover:text-primary transition-colors text-xs font-bold uppercase tracking-tighter" href="#">System Status</a>
</div>
</div>
</main>
<!-- Visual Anchor Decorations -->
<div class="fixed top-12 left-12 flex flex-col gap-1 opacity-20">
<div class="w-8 h-[2px] bg-outline"></div>
<div class="w-4 h-[2px] bg-outline"></div>
</div>
<div class="fixed bottom-12 right-12 flex flex-col items-end gap-1 opacity-20">
<div class="w-4 h-[2px] bg-outline"></div>
<div class="w-8 h-[2px] bg-outline"></div>
</div>
</body></html>
